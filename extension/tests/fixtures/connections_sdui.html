   • każdy kontakt = DWA <a href="/in/slug">: link-zdjęcie (<figure>+<svg
     aria-label="…użytkownika IMIĘ">) + link-nazwa (<p>IMIĘ</p> + <p><span>headline</span></p>)
   • brak <li>/.mn-connection-card/role=listitem; kontenery mają componentkey
  Edge case'y: open-to-work (sufiks w aria), slug %-encoded, odwrócona kolejność
  linków, oraz nav/aside z /in/ które MUSZĄ być pominięte.
