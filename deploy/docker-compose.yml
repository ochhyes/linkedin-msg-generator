services:
  backend:
    build: ../backend
    container_name: linkedin-msg-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      # Bind ONLY to localhost — host's nginx reverse-proxies here.
      - "127.0.0.1:8321:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
