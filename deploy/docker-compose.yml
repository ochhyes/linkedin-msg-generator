services:
  backend:
    build: ../backend
    container_name: linkedin-msg-backend
    restart: unless-stopped
    env_file:
      - ../backend/.env
    expose:
      - "8000"
    networks:
      - linkedin-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    container_name: linkedin-msg-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - linkedin-net
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!};
      nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    container_name: linkedin-msg-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"

networks:
  linkedin-net:
    driver: bridge
