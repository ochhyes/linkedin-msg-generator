# Drop into /etc/nginx/sites-available/linkedin-api.szmidtke.pl
# then: sudo ln -s /etc/nginx/sites-available/linkedin-api.szmidtke.pl /etc/nginx/sites-enabled/
#
# Backend container binds to 127.0.0.1:8321 on the host (see deploy/docker-compose.yml).
#
# First deploy: use the HTTP-only server block below, run certbot, then certbot
# rewrites this file to add the HTTPS block + redirect. No manual edits needed.

server {
    listen 80;
    listen [::]:80;
    server_name linkedin-api.szmidtke.pl;

    # Rate limiting (10 req/s with burst 20) — define zone in http{} block
    # (see nginx.conf snippet in DEPLOY.md if not already present).
    limit_req zone=linkedin_api burst=20 nodelay;

    # Body size limit (profile payloads are small)
    client_max_body_size 256k;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location /api/ {
        proxy_pass         http://127.0.0.1:8321;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location = / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    location / {
        return 404;
    }
}
